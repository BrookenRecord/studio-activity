syntax = "proto3";

package api.v1;

// --- Telemetry ---

message TelemetryRequest {
  string distinct_id = 1;

  // Plugin build metadata — attributed to every event.
  string plugin_version = 2;
  string plugin_channel = 3;
  string plugin_hash = 4;
  PluginBuildTarget plugin_target = 6;

  // Client-generated UUID v4, created once per plugin load. Groups all
  // events from the same Studio session in PostHog's session view.
  string session_id = 7;

  oneof event {
    PluginLoaded plugin_loaded = 10;
    UiOpened ui_opened = 11;
    OnboardingCompleted onboarding_completed = 12;
    AccountLinkStarted account_link_started = 13;
    AccountLinked account_linked = 14;
    DeviceCodeFlowFailed device_code_flow_failed = 15;
    BrowserFlowFailed browser_flow_failed = 21;
    AccountRemoved account_removed = 16;
    PresenceToggled presence_toggled = 17;
    ProfileSelected profile_selected = 18;
    SessionError session_error = 19;
    PluginUnloaded plugin_unloaded = 20;
  }
}

/// Identifies if this build of the plugin came from a Creator Store deployment
// or local rbxm build. Allows us to attribute where users are finding and
// installing the plugin.
enum PluginBuildTarget {
  PLUGIN_BUILD_TARGET_UNSPECIFIED = 0;
  PLUGIN_BUILD_TARGET_LOCAL = 1;
  PLUGIN_BUILD_TARGET_CREATOR_STORE = 2;
}

// Fired on plugin init (before UI). Carries current user state
// so PostHog person properties stay up to date each session.
message PluginLoaded {
  int32 account_count = 1;
  bool is_presence_active = 2;
  string active_profile = 3;
}

// User opened the plugin dock widget.
message UiOpened {}

// User completed the welcome/onboarding dialog.
message OnboardingCompleted {
  bool opted_into_telemetry = 1;
}

// User opened the Add Account sheet.
message AccountLinkStarted {}

// Which OAuth linking flow completed successfully.
enum AccountLinkFlow {
  ACCOUNT_LINK_FLOW_UNSPECIFIED = 0;
  ACCOUNT_LINK_FLOW_DEVICE_CODE = 1;
  ACCOUNT_LINK_FLOW_BROWSER = 2;
}

// A Discord account was successfully linked.
message AccountLinked {
  int32 account_count = 1;
  bool is_first_account = 2;
  AccountLinkFlow link_flow = 3;
}

// The device code (QR / user code) auth flow ended in error.
message DeviceCodeFlowFailed {
  string error = 1;
}

// The browser-based auth flow ended in error.
message BrowserFlowFailed {
  string error = 1;
}

// User disconnected a Discord account.
message AccountRemoved {
  int32 account_count = 1;
}

// User toggled the global Active/Inactive presence switch.
message PresenceToggled {
  bool is_active = 1;
}

// User changed their presence profile preset.
message ProfileSelected {
  string profile = 1;
}

// A terminal Discord session or token failure that impacts the user.
message SessionError {
  string error = 1;
}

// Fired when the plugin is unloading (Studio closing or plugin reload).
// Bookends PluginLoaded so PostHog can compute session duration.
message PluginUnloaded {}

// --- Browser OAuth2 (PKCE) ---

// Plugin asks the backend to create a new browser-flow session. The
// code_challenge is base64url(SHA256(code_verifier)); the verifier
// itself never leaves the plugin, so the backend cannot exchange the
// authorization code for tokens on its own.
message BrowserFlowStartRequest {
  string code_challenge = 1;
}

message BrowserFlowStartResponse {
  // Opaque session identifier. Used as the Discord `state` parameter
  // and as the KV key on the backend. The plugin echoes it back on
  // every poll.
  string session_token = 1;

  // Short URL the user pastes into their browser. Hits the backend,
  // which redirects to Discord's authorize URL with all the right
  // parameters.
  string start_url = 2;

  // Exact redirect_uri the backend will hand Discord. The plugin MUST
  // send this identical value when exchanging the code, otherwise
  // Discord will reject the token request.
  string redirect_uri = 3;

  // Seconds until the backend stops accepting polls / callbacks for
  // this session.
  int32 expires_in = 4;

  // Recommended polling interval in seconds.
  int32 poll_interval = 5;
}

message BrowserFlowPollRequest {
  string session_token = 1;
}

enum BrowserFlowStatus {
  BROWSER_FLOW_STATUS_UNSPECIFIED = 0;
  BROWSER_FLOW_STATUS_PENDING = 1;
  BROWSER_FLOW_STATUS_COMPLETE = 2;
  BROWSER_FLOW_STATUS_DENIED = 3;
  BROWSER_FLOW_STATUS_EXPIRED = 4;
}

message BrowserFlowPollResponse {
  BrowserFlowStatus status = 1;

  // Only populated when status == COMPLETE. Consumed exactly once: the
  // backend deletes the KV entry on the same response that hands the
  // code over.
  string code = 2;
}

// --- Plugin updates ---

// Latest published GitHub release for the plugin. The backend caches
// the upstream GitHub response in KV (~5 min) so the plugin can poll
// freely without burning the unauthenticated API budget.
message LatestVersionResponse {
  // Release tag, e.g. "v0.2.0".
  string tag = 1;

  // Plain version string parsed from the tag (no leading "v"),
  // e.g. "0.2.0". Compared verbatim against `BuildVars.build.version`.
  string version = 2;

  // GitHub release page URL, surfaced to users for the changelog.
  string html_url = 3;

  // ISO-8601 publish timestamp from GitHub.
  string published_at = 4;
}
