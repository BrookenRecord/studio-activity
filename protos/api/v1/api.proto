syntax = "proto3";

package api.v1;

// --- Telemetry ---

message TelemetryRequest {
  string distinct_id = 1;

  // Plugin build metadata — attributed to every event.
  string plugin_version = 2;
  string plugin_channel = 3;
  string plugin_hash = 4;

  // Client-generated UUID v4, created once per plugin load. Groups all
  // events from the same Studio session in PostHog's session view.
  string session_id = 5;

  oneof event {
    PluginLoaded plugin_loaded = 10;
    UiOpened ui_opened = 11;
    OnboardingCompleted onboarding_completed = 12;
    AccountLinkStarted account_link_started = 13;
    AccountLinked account_linked = 14;
    DeviceCodeFlowFailed device_code_flow_failed = 15;
    BrowserFlowFailed browser_flow_failed = 21;
    AccountRemoved account_removed = 16;
    PresenceToggled presence_toggled = 17;
    ProfileSelected profile_selected = 18;
    SessionError session_error = 19;
    PluginUnloaded plugin_unloaded = 20;
  }
}

// Fired on plugin init (before UI). Carries current user state
// so PostHog person properties stay up to date each session.
message PluginLoaded {
  int32 account_count = 1;
  bool is_presence_active = 2;
  string active_profile = 3;
}

// User opened the plugin dock widget.
message UiOpened {}

// User completed the welcome/onboarding dialog.
message OnboardingCompleted {
  bool opted_into_telemetry = 1;
}

// User opened the Add Account sheet.
message AccountLinkStarted {}

// Which OAuth linking flow completed successfully.
enum AccountLinkFlow {
  ACCOUNT_LINK_FLOW_UNSPECIFIED = 0;
  ACCOUNT_LINK_FLOW_DEVICE_CODE = 1;
  ACCOUNT_LINK_FLOW_BROWSER = 2;
}

// A Discord account was successfully linked.
message AccountLinked {
  int32 account_count = 1;
  bool is_first_account = 2;
  AccountLinkFlow link_flow = 3;
}

// The device code (QR / user code) auth flow ended in error.
message DeviceCodeFlowFailed {
  string error = 1;
}

// The browser-based auth flow ended in error.
message BrowserFlowFailed {
  string error = 1;
}

// User disconnected a Discord account.
message AccountRemoved {
  int32 account_count = 1;
}

// User toggled the global Active/Inactive presence switch.
message PresenceToggled {
  bool is_active = 1;
}

// User changed their presence profile preset.
message ProfileSelected {
  string profile = 1;
}

// A terminal Discord session or token failure that impacts the user.
message SessionError {
  string error = 1;
}

// Fired when the plugin is unloading (Studio closing or plugin reload).
// Bookends PluginLoaded so PostHog can compute session duration.
message PluginUnloaded {}
