name = 'studio-activity'
main = "build/index.js"
compatibility_date = "2026-04-05"

[build]
command = "cargo install -q \"worker-build@^0.7\" && worker-build --release"

[vars]
POSTHOG_HOST = "https://us.i.posthog.com"

# POSTHOG_API_KEY is set via `wrangler secret put POSTHOG_API_KEY`

[[kv_namespaces]]
binding = "TELEMETRY_KV"
id = "15efd808adc6465985093413fe84a9d7"

# Per-IP telemetry rate limit: 100 events per 60 seconds
[[ratelimits]]
name = "TELEMETRY_IP_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 100
period = 60

# Per-user telemetry rate limit: 30 events per 60 seconds
[[ratelimits]]
name = "TELEMETRY_USER_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 30
period = 60
